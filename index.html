<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathHero Learning Portal</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #fffae6; color: #2d3748; margin: 0; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; }
        .app-card { width: 100%; max-width: 460px; background: white; border: 4px solid #4f46e5; border-radius: 24px; padding: 20px; box-sizing: border-box; box-shadow: 0 8px 16px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .app-title { background: #ff477e; color: white; margin: -20px -20px 20px -20px; padding: 15px; text-align: center; font-size: 22px; font-weight: 900; border-radius: 20px 20px 0 0; }
        .section-label { font-size: 13px; font-weight: 800; color: #4f46e5; text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 0.5px; }
        
        /* Fixed Flat Block Selectors */
        .block-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .track-row { display: grid; grid-template-cols: repeat(3, 1fr); gap: 6px; margin-bottom: 20px; }
        
        button.choice-btn { background: #ffffff; border: 2px solid #e2e8f0; padding: 12px 8px; border-radius: 14px; font-size: 13px; font-weight: 700; color: #475569; cursor: pointer; text-align: center; }
        button.choice-btn.active { background: #e0f2fe !important; border-color: #0284c7 !important; color: #0369a1 !important; box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15); }
        
        /* Permanent Visual Dashboard Container Panels */
        .age-panel-group { border: 1px solid #e2e8f0; padding: 12px; border-radius: 16px; background: #f8fafc; margin-bottom: 10px; }
        .age-buttons-row { display: grid; grid-template-cols: repeat(3, 1fr); gap: 6px; }

        .chalkboard { background: #0f172a; color: #f8fafc; border-radius: 20px; padding: 20px; font-family: monospace; font-size: 14px; min-height: 140px; margin-bottom: 15px; line-height: 1.6; white-space: pre-wrap; }
        .numpad { display: grid; grid-template-cols: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 460px; }
        .key { background: white; border: 2px solid #cbd5e1; border-bottom-width: 5px; padding: 14px; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; text-align: center; }
        .key:active { border-bottom-width: 2px; transform: translateY(3px); }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="app-title">🚀 MathHero Portal</div>
        
        <!-- Step 1: Syllabus Choices -->
        <span class="section-label">📋 Step 1: Select Syllabus Track</span>
        <div class="track-row">
            <button onclick="changeSyllabus('SK_UASA')" id="syl-SK_UASA" class="choice-btn active">SK Malay</button>
            <button onclick="changeSyllabus('SJKC_UASA')" id="syl-SJKC_UASA" class="choice-btn">SJKC 中文</button>
            <button onclick="changeSyllabus('BRITISH_CORE')" id="syl-BRITISH_CORE" class="choice-btn">British Eng</button>
        </div>

        <!-- Step 2: Permanent Local School Grid Container -->
        <div class="age-panel-group" id="local-box" style="display: block;">
            <span class="section-label" style="color:#ff477e;">🇲🇾 Local UASA Levels</span>
            <div class="age-buttons-row">
                <button onclick="changeAge('6_7')" id="age-6_7" class="choice-btn active">Ages 6-7 (Std 1)</button>
                <button onclick="changeAge('8')" id="age-8" class="choice-btn">Age 8 (Std 2)</button>
                <button onclick="changeAge('9')" id="age-9" class="choice-btn">Age 9 (Std 3)</button>
                <button onclick="changeAge('10')" id="age-10" class="choice-btn">Age 10 (Std 4)</button>
                <button onclick="changeAge('11')" id="age-11" class="choice-btn">Age 11 (Std 5)</button>
                <button onclick="changeAge('12')" id="age-12" class="choice-btn">Age 12 (Std 6)</button>
            </div>
        </div>

        <!-- Step 3: Permanent British International Grid Container -->
        <div class="age-panel-group" id="british-box" style="display: none;">
            <span class="section-label" style="color:#f72585;">🇬🇧 British Primary Levels</span>
            <div class="age-buttons-row">
                <button onclick="changeAge('5_6')" id="age-5_6" class="choice-btn">Ages 5-6 (Yr 1)</button>
                <button onclick="changeAge('7')" id="age-b7" class="choice-btn">Age 7 (Yr 2)</button>
                <button onclick="changeAge('8')" id="age-b8" class="choice-btn">Age 8 (Yr 3)</button>
                <button onclick="changeAge('9')" id="age-b9" class="choice-btn">Age 9 (Yr 4)</button>
                <button onclick="changeAge('10')" id="age-b10" class="choice-btn">Age 10 (Yr 5)</button>
                <button onclick="changeAge('11')" id="age-b11" class="choice-btn">Age 11 (Yr 6)</button>
            </div>
        </div>
        
        <!-- Visual Content Display Module -->
        <span class="section-label">📡 Live Program Terminal</span>
        <div class="chalkboard" id="console-screen">Loading math syllabus database tracks...</div>
    </div>

    <!-- Numeric Input Pad -->
    <div class="numpad">
        <button onclick="typeNum(1)" class="key">1</button>
        <button onclick="typeNum(2)" class="key">2</button>
        <button onclick="typeNum(3)" class="key">3</button>
        <button onclick="typeNum(4)" class="key">4</button>
        <button onclick="typeNum(5)" class="key">5</button>
        <button onclick="typeNum(6)" class="key">6</button>
        <button onclick="typeNum(7)" class="key">7</button>
        <button onclick="typeNum(8)" class="key">8</button>
        <button onclick="typeNum(9)" class="key">9</button>
        <button onclick="wipeNum()" class="key" style="background:#ff477e; color:white; border-color:#ff477e;">⌫</button>
        <button onclick="submitAnswer()" class="key" style="background:#34d399; color:white; border-color:#34d399; grid-column: span 2;">Verify Answer ✓</button>
    </div>

    <script>
        let track = 'SK_UASA';
        let ageGroup = '6_7';
        let currentInput = "";

        function changeSyllabus(val) {
            track = val;
            document.querySelectorAll('.track-row .choice-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('syl-' + val).classList.add('active');
            
            if(val === 'BRITISH_CORE') {
                document.getElementById('local-box').style.display = 'none';
                document.getElementById('british-box').style.display = 'block';
                ageGroup = '5_6';
                document.querySelectorAll('#british-box .choice-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('age-5_6').classList.add('active');
            } else {
                document.getElementById('local-box').style.display = 'block';
                document.getElementById('british-box').style.display = 'none';
                ageGroup = '6_7';
                document.querySelectorAll('#local-box .choice-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('age-6_7').classList.add('active');
            }
            pullContent();
        }

        function changeAge(val) {
            ageGroup = val;
            const contextId = (track === 'BRITISH_CORE') ? 'british-box' : 'local-box';
            document.querySelectorAll('#' + contextId + ' .choice-btn').forEach(b => b.classList.remove('active'));
            
            if(track === 'BRITISH_CORE') {
                if(val === '5_6') document.getElementById('age-5_6').classList.add('active');
                else document.getElementById('age-b' + val).classList.add('active');
            } else {
                document.getElementById('age-' + val).classList.add('active');
            }
            pullContent();
        }

        function typeNum(n) { currentInput += n; document.getElementById('answer-slot').innerText = currentInput; }
        function wipeNum() { currentInput = ""; document.getElementById('answer-slot').innerText = "?"; }
        function submitAnswer() { if(!currentInput) return; alert("Answer Submitted! Sandbox Route Active."); wipeNum(); }

        async function pullContent() {
            const display = document.getElementById('console-screen');
            try {
                const res = await fetch('math_syllabus.json?update=' + new Date().getTime());
                const database = await res.json();
                const node = database.segmented_curriculums[track]["Age_" + ageGroup];
                
                if(ageGroup === '6_7' || ageGroup === '5_6') {
                    display.innerHTML = `[ACTIVE TRACK]: ` + track.replace('_UASA','') + `\n[TOPIC]: ` + node.topic + `\n-----------------------------------\n    25\n  + 09\n  ------\n   [ <span id="answer-slot" style="color:#ff477e; font-weight:bold;">?</span> ]\n-----------------------------------\n🎯 Target: ` + node.exam_target;
                } else {
                    display.innerHTML = `[ACTIVE TRACK]: ` + track.replace('_UASA','') + `\n[TOPIC]: ` + node.topic + `\n-----------------------------------\n👉 QUESTION:\n"` + node.question + `"\n\n👉 INPUT: [ <span id="answer-slot" style="color:#ff477e; font-weight:bold;">?</span> ]\n-----------------------------------\n🎯 Benchmark: ` + node.exam_target;
                }
            } catch(err) {
                display.innerHTML = "Database Syncing... Click 'SK Malay' or 'British Eng' to initialize coordinates.";
            }
        }

        window.onload = pullContent;
    </script>
</body>
</html>
