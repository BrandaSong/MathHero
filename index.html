<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathHero Kids Learning Game</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #fffae6; color: #2d3748; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* App Header Dashboard */
        .app-header { width: 100%; max-width: 480px; background: #ff477e; color: white; padding: 12px 16px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(255, 71, 126, 0.2); }
        .app-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
        .progress-indicator { background: rgba(0,0,0,0.15); padding: 4px 12px; border-radius: 99px; font-size: 13px; font-weight: bold; }
        
        .main-container { width: 100%; max-width: 480px; padding: 16px; box-sizing: border-box; display: flex; flex-direction: column; gap: 16px; }
        
        /* Interactive Subject Selector Matrix */
        .subject-grid { display: grid; grid-template-cols: repeat(4, 1fr); gap: 8px; margin-bottom: 4px; }
        .subject-btn { background: white; border: 3px solid #e2e8f0; border-radius: 16px; padding: 8px; font-size: 11px; font-weight: 800; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: transform 0.1s; }
        .subject-btn:active { transform: scale(0.95); }
        .subject-btn.active { border-color: #4cc9f0 !important; background: #e8f7fc !important; }
        .icon-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; color: white; font-weight: bold; }
        
        /* Level Matrix Selection Tabs */
        .level-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
        .level-btn { background: #fff; border: 2px solid #cbd5e1; padding: 8px 14px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
        .level-btn.active { background: #4cc9f0; color: white; border-color: #4cc9f0; }

        /* The Premium Math Chalkboard Grid Pad Display */
        .chalkboard-container { background: #ffffff; border: 4px solid #4f46e5; border-radius: 24px; padding: 24px; box-shadow: 0 8px 16px rgba(79, 70, 229, 0.1); min-height: 220px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .grid-paper { width: 100%; background-size: 24px 24px; background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px); display: flex; flex-direction: column; align-items: center; padding: 12px 0; }
        
        /* Math Equation Layout Alignments */
        .math-equation { font-size: 42px; font-weight: 900; font-family: monospace; text-align: right; letter-spacing: 4px; color: #1e293b; line-height: 1.4; display: inline-block; }
        .math-line { border-top: 5px solid #1e293b; margin-top: 4px; width: 120px; display: inline-block; }
        .input-box-display { color: #ff477e; font-weight: 900; background: #fff5f7; border: 3px dashed #ff477e; padding: 2px 12px; border-radius: 10px; min-width: 60px; display: inline-block; text-align: center; }
        
        /* Touchscreen 1-9 Numeric Keypad System */
        .numpad-container { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-top: 8px; }
        .num-key { background: white; border: none; border-bottom: 5px solid #cbd5e1; border-radius: 16px; padding: 16px; font-size: 22px; font-weight: 900; color: #475569; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
        .num-key:active { border-bottom-width: 1px; margin-top: 4px; margin-bottom: -4px; background: #f1f5f9; }
        .num-key.action-clear { background: #ff477e; border-color: #e03162; color: white; }
        .num-key.action-check { background: #34d399; border-color: #059669; color: white; grid-column: span 2; }
    </style>
</head>
<body>

    <nav class="app-header">
        <div class="app-title">🚀 MathHero Club</div>
        <div class="progress-indicator" id="progress-text">Lesson 1/1</div>
    </nav>

    <main class="main-container">
        <!-- Gamified Curriculum Selection Blocks -->
        <div class="subject-grid">
            <button onclick="setSyllabus('SK_UASA')" id="syl-SK_UASA" class="subject-btn active">
                <div class="icon-circle" style="background:#ff477e;">🇲🇾</div>
                <span>SK Malay</span>
            </button>
            <button onclick="setSyllabus('SJKC_UASA')" id="syl-SJKC_UASA" class="subject-btn">
                <div class="icon-circle" style="background:#4cc9f0;">🇨🇳</div>
                <span>SJKC 华语</span>
            </button>
            <button onclick="setSyllabus('IGCSE_Core')" id="syl-IGCSE_Core" class="subject-btn">
                <div class="icon-circle" style="background:#f72585;">🇬🇧</div>
                <span>IGCSE Eng</span>
            </button>
            <button onclick="alert('Subscription Lock: Upgrade to access advanced visual test modules.')" class="subject-btn" style="opacity: 0.6;">
                <div class="icon-circle" style="background:#7209b7;">⭐</div>
                <span>Premium</span>
            </button>
        </div>

        <!-- Dynamic Year Selection Tabs -->
        <div class="level-tabs">
            <button onclick="setAge('6_7')" id="age-6_7" class="level-btn active">Ages 6-7 (Std 1)</button>
            <button onclick="setAge('8')" id="age-8" class="level-btn">Age 8 (Std 2)</button>
            <button onclick="setAge('9')" id="age-9" class="level-btn">Age 9 (Std 3)</button>
            <button onclick="setAge('10')" id="age-10" class="level-btn">Age 10 (Std 4)</button>
            <button onclick="setAge('11')" id="age-11" class="level-btn">Age 11 (Std 5)</button>
            <button onclick="setAge('12')" id="age-12" class="level-btn">Age 12 (Std 6)</button>
        </div>

        <!-- Visual Core Notebook Blackboard Layout -->
        <div class="chalkboard-container">
            <div class="grid-paper" id="problem-screen">
                <div class="math-equation" id="equation-display">
                    Select criteria above<br>to view gamified pad
                </div>
            </div>
        </div>

        <!-- Physical Input Numeric Pad Panel -->
        <div class="numpad-container">
            <button onclick="pressNum(1)" class="num-key">1</button>
            <button onclick="pressNum(2)" class="num-key">2</button>
            <button onclick="pressNum(3)" class="num-key">3</button>
            <button onclick="pressNum(4)" class="num-key">4</button>
            <button onclick="pressNum(5)" class="num-key">5</button>
            <button onclick="pressNum(6)" class="num-key">6</button>
            <button onclick="pressNum(7)" class="num-key">7</button>
            <button onclick="pressNum(8)" class="num-key">8</button>
            <button onclick="pressNum(9)" class="num-key">9</button>
            <button onclick="clearInput()" class="num-key action-clear">⌫</button>
            <button onclick="validateAnswer()" class="num-key action-check">Check True ✓</button>
        </div>
    </main>

    <script>
        let selectedAge = '6_7';
        let selectedSyllabus = 'SK_UASA';
        let typedInput = "";

        // Instantly trigger sample problem routing arrays
        function setAge(val) {
            selectedAge = val;
            document.querySelectorAll('.level-tabs .level-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('age-' + val).classList.add('active');
            syncEngine();
        }

        function setSyllabus(val) {
            selectedSyllabus = val;
            document.querySelectorAll('.subject-grid .subject-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('syl-' + val).classList.add('active');
            syncEngine();
        }

        function pressNum(num) {
            typedInput += num;
            document.getElementById('user-answer').innerText = typedInput;
        }

        function clearInput() {
            typedInput = "";
            document.getElementById('user-answer').innerText = "?";
        }

        function validateAnswer() {
            if(!typedInput) return;
            alert("Excellent Effort! Answer logged securely in Sandbox Mode.");
            clearInput();
        }

        async function syncEngine() {
            const screen = document.getElementById('equation-display');
            const progress = document.getElementById('progress-text');
            
            try {
                const response = await fetch('math_syllabus.json');
                const data = await response.json();
                const module = data.segmented_curriculums[selectedSyllabus]["Age_" + selectedAge];
                
                progress.innerText = selectedSyllabus.replace('_UASA','') + " | " + "Level " + selectedAge.replace('_','-');
                
                // Formulate the vertical structured digit layout block
                if (selectedAge === '6_7') {
                    screen.innerHTML = `
                        <div style="text-align:right; font-size:36px; padding-right:20px;">
                            &nbsp;&nbsp;25<br>
                            +&nbsp;09<br>
                            <span class="math-line"></span><br>
                            <div class="input-box-display" id="user-answer">?</div>
                        </div>
