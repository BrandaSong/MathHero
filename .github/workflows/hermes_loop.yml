name: 24/7 Hermes Math App Builder

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Post Checkout Code Base
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install AI Core Dependencies
      run: pip install openai httpx

    - name: Deploy Native Hermes Math Engine
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python -c "
        import os, json, time
        
        master_content = {
            'SK_UASA': {
                'Age_6_7': {'topic': 'Nombor Bulat hingga 100', 'question': 'Ali ada 12 pensel warna. Raju memberi 7 pensel warna lagi kepadanya. Berapakah jumlah pensel warna Ali sekarang?', 'exam_target': 'Standard Baru 2027: UASA Bahagian A - Pemahaman Asas'},
                'Age_8': {'topic': 'Operasi Asas Darab (2, 5, 10)', 'question': 'Terdapat 4 buah basikal. Setiap basikal mempunyai 2 roda. Berapakah jumlah roda keseluruhannya?', 'exam_target': 'UASA Pentaksiran Bilik Darjah (PBD)'},
                'Age_9': {'topic': 'Pecahan dan Perpuluhan', 'question': 'Siti memotong sebiji kek kepada 4 bahagian yang sama besar. Dia makan 1 bahagian. Apakah pecahan kek yang tinggal?', 'exam_target': 'UASA Bahagian A - Kemahiran Nombor'},
                'Age_10': {'topic': 'Masa, Jisim & Isi Padu Cecair', 'question': 'Sebuah botol mengandungi 1.5 liter air. Tukarkan isi padu cecair ini kepada mililitir (ml) sepenuhnya.', 'exam_target': 'UASA Bahagian B - Penyelesaian Masalah'},
                'Age_11': {'topic': 'Pengurusan Data & Purata', 'question': 'Markah ujian bagi tiga orang murid ialah 80, 85, dan 90. Hitungkan min (purata) markah mereka.', 'exam_target': 'UASA Kemahiran Berfikir Aras Tinggi (KBAT)'},
                'Age_12': {'topic': 'Peratus & Pengurusan Kewangan', 'question': 'Harga sebuah kalkulator ialah RM 80. Semasa jualan Hari Raya, diskaun sebanyak 15% diberikan. Hitung harga jualan akhir.', 'exam_target': 'UASA Bahagian B - Aplikasi Komprehensif'}
            },
            'SJKC_UASA': {
                'Age_6_7': {'topic': '100以内的加减法应用', 'question': '美美有 25 个红气球，蓝气球比红气球少 9 个。美美一共有多少个气球？', 'exam_target': '2027新政策标准：UASA 甲组 - 基本概念应用'},
                'Age_8': {'topic': '乘法与除法概念应用', 'question': '老师把 24 支铅笔平均分给 6 个同学。每个同学可以得到多少支铅笔？', 'exam_target': 'UASA 课堂评估 (PBD) 标准'},
                'Age_9': {'topic': '分数的初步认识与大小比较', 'question': '一个西瓜平均切成 8 块，小明吃了 3 块，小红吃了 2 块。他们一共吃了这个西瓜的几分之几？', 'exam_target': 'UASA 甲组 - 算术与分数高阶题'},
                'Age_10': {'topic': '图形的周长与面积计算', 'question': '一个长方形的长是 12 厘米，宽是 5 厘米。计算这个长方形的面积（平方厘米）。', 'exam_target': 'UASA 乙组 - 空间与几何解决问题'},
                'Age_11': {'topic': '小数混合运算与应用', 'question': '一箱苹果重 15.6 公斤。卖出 4.25 公斤后，又补进 6.8 公斤。现在箱子里有多少公斤苹果？', 'exam_target': 'UASA 高阶思维技能 (KBAT) 模拟题'},
                'Age_12': {'topic': '比与比例及统计图表', 'question': '在一个盒子里，红球与蓝球的比是 3:5。如果蓝球有 40 个，盒子里一共有多少个球？', 'exam_target': 'UASA 乙组 - 综合应用与统考备考'}
            },
            'BRITISH_CORE': {
                'Age_5_6': {'topic': 'Number Bonds & Basic Addition', 'question': 'There are 5 red apples and 4 green apples in a basket. How many fruits are there altogether?', 'exam_target': 'British Curriculum Year 1 Foundation Assessment'},
                'Age_7': {'topic': 'Simple Sequences & Patterns', 'question': 'Complete the missing term in the sequence: 5, 10, 15, [ ? ], 25.', 'exam_target': 'Cambridge Primary Progression Stage 2'},
                'Age_8': {'topic': 'Place Value & 2D Shapes', 'question': 'In the base-10 number 482, what is the exact value of the digit 8?', 'exam_target': 'Edexcel Primary Core Year 3 Target'},
                'Age_9': {'topic': 'Fractions & Mental Math Calculations', 'question': 'John eats 2/6 of a pizza. What fraction of the pizza is remaining?', 'exam_target': 'Cambridge Primary Progression Stage 4 Test'},
                'Age_10': {'topic': 'Decimals & Measurement Conversions', 'question': 'A water container holds 2.5 liters of liquid. Convert this capacity into milliliters (ml).', 'exam_target': 'British Curriculum Key Stage 2 Year 5 Standard'},
                'Age_11': {'topic': 'Foundational Algebraic Expressions', 'question': 'Simplify the following expression completely: 5x + 3y - 2x + 4y.', 'exam_target': 'Cambridge Primary Checkpoint Year 6 Diagnostic'}
            }
        }
        
        app_json = {'metadata': {'branding': 'MathHero Digital Enterprise', 'last_build': time.strftime('%Y-%m-%d')}, 'segmented_curriculums': master_content}
        with open('math_syllabus.json', 'w') as f:
            json.dump(app_json, f, indent=2)
            
        print('International British Syllabus criteria successfully integrated!')
        "

    - name: Commit and Save MathHero Files to Repository
      run: |
        git config --global user.name "Hermes Math Builder"
        git config --global user.email "hermes-agent@nousresearch.com"
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "Align international track with British Curriculum standards"
        git push origin main || echo "Sync stable"
