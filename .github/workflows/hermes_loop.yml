name: 24/7 Hermes Math App Builder
on:
  schedule:
    - cron: '0 */6 * * *' # Wakes up automatically every 6 hours, 24/7
  workflow_dispatch: # Allows manual trigger with 1 click anytime

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install AI Core Dependencies
        run: pip install openai httpx

      - name: Deploy Native Hermes Math Engine
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -c "
          import os, json, openai, httpx, time
          
          # Use explicit configurations for network reliability
          http_client = httpx.Client(
              timeout=httpx.Timeout(60.0, connect=30.0),
              follow_redirects=True
          )
          
          client = openai.OpenAI(
              base_url='https://openrouter.ai',
              api_key=os.environ['OPENROUTER_API_KEY'],
              http_client=http_client
          )
          
          prompt = '''
          Act as a Malaysian Curriculum Specialist and Senior Mobile App Developer. 
          Analyze our workspace. Autonomously design and output a clean JSON database structural file for a Primary School (Ages 6-12) Math App named MathHero. 
          Generate gamified, step-by-step interactive math question sets separated cleanly into local public system tracks (UASA / KSSM for SJKC and SK) and international curriculum tracks (IGCSE).
          Output ONLY valid JSON code inside a clean dictionary layout.
          '''
          
          # Network backup loop
          for attempt in range(3):
              try:
                  print(f'Sending request to OpenRouter API (Attempt {attempt + 1}/3)...')
                  response = client.chat.completions.create(
                      model='meta-llama/llama-3-8b-instruct:free',
                      messages=[{'role': 'user', 'content': prompt}]
                      
                  )
                  
                  with open('math_syllabus_db.json', 'w') as f:
                      f.write(response.choices.message.content)
                  print('Syllabus file generated successfully!')
                  break
              except Exception as e:
                  print(f'Connection failed: {e}')
                  if attempt < 2:
                      print('Waiting 10 seconds before retrying...')
                      time.sleep(10)
                  else:
                      raise e
          "

      - name: Commit and Save MathHero Files to Repository
        run: |
          git config --global user.name 'Hermes Agent Loop'
          git config --global user.email 'hermes@agent.loop'
          git add math_syllabus_db.json
          git diff --quiet && git diff --staged --quiet || (git commit -m 'Autonomously updated MathHero database framework' && git push)
