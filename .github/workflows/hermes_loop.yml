name: 24/7 Hermes Math App Builder

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Runs automatically every 6 hours to monitor/update content

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Post Checkout Code Base
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install AI Core Dependencies
      run: pip install openai httpx

    - name: Deploy Native Hermes Math Engine
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python -c "
        import os, json, openai, httpx, time
        
        # Safe HTTP Client Setup
        http_client = httpx.Client(timeout=60.0, follow_redirects=True)
        print('Hermes Engine successfully initialized!')
        "

    - name: Commit and Save MathHero Files to Repository
      run: |
        git config --global user.name "Hermes Math Builder"
        git config --global user.email "hermes-agent@nousresearch.com"
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "Automated MathHero application content update by Hermes Agent"
        git push origin main || echo "No changes to push or push failed"
